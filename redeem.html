<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性格测试兑换 · 多测试版</title>
    <script src="codes.js"></script>
    <style>
        /* 样式与之前相同，此处省略以节省空间，请保留原有样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f4f7fb, #e9eef4);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1rem;
        }
        .card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            box-shadow: 0 20px 40px -12px rgba(0,20,40,0.25);
            width: 100%;
            max-width: 460px;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255,255,255,0.5);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e2b3c, #2c3e50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 0.3rem;
        }
        .sub {
            text-align: center;
            color: #5b6f82;
            margin-bottom: 2.5rem;
            border-bottom: 1px dashed #cbd5e1;
            padding-bottom: 0.75rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .code-input {
            width: 100%;
            padding: 0 20px;
            height: 58px;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            outline: none;
            transition: 0.2s;
            background: #ffffffd9;
        }
        .code-input:focus {
            border-color: #7c9bc0;
            box-shadow: 0 0 0 4px rgba(124,155,192,0.2);
        }
        .enter-btn {
            background: #2d3e58;
            border: none;
            height: 58px;
            border-radius: 24px;
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 18px -8px #1e2f3f80;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.15s;
        }
        .enter-btn:hover {
            background: #1f2e44;
            transform: scale(1.02);
        }
        .enter-btn:active {
            transform: scale(0.97);
        }
        .reserved-hint {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #8899aa;
            text-align: center;
            border-top: 1px dotted #ccdbe9;
            padding-top: 1rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚡ 性格测试兑换</h1>
        <div class="sub">输入兑换码 · 自动识别测试类型</div>
        <div class="input-group">
            <input type="text" id="redeemCode" class="code-input" placeholder="例如：A7B9-2K4M-PQ8R" autofocus>
            <button id="enterBtn" class="enter-btn">
                <span>进入</span>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>
        <div class="reserved-hint">
            ⚙️ 完成测试后兑换码自动失效，中途退出可重新进入
        </div>
    </div>

    <script>
        (function() {
            const TEST_PAGE_MAP = {
                'A': 'https://zhangjulie.github.io/-/test.html',
                'B': 'https://zhangjulie.github.io/-/ex-wealth-leap-assessment.html',
                'C': 'https://zhangjulie.github.io/-/test-c.html',
                'D': 'https://zhangjulie.github.io/-/test-d.html'
            };

            function getTargetUrlByCode(code) {
                if (!code) return null;
                const firstChar = code.charAt(0).toUpperCase();
                const baseUrl = TEST_PAGE_MAP[firstChar];
                if (!baseUrl) {
                    alert(`未配置该类型测试（${firstChar}）`);
                    return null;
                }
                try {
                    const url = new URL(baseUrl);
                    url.searchParams.set('code', encodeURIComponent(code));
                    return url.toString();
                } catch (e) {
                    const separator = baseUrl.includes('?') ? '&' : '?';
                    return `${baseUrl}${separator}code=${encodeURIComponent(code)}`;
                }
            }

            const codeInput = document.getElementById('redeemCode');
            const enterBtn = document.getElementById('enterBtn');

            function handleRedeem() {
                const rawCode = codeInput.value.trim();
                if (!rawCode) {
                    alert('请输入兑换码');
                    codeInput.focus();
                    return;
                }

                // 仅验证，不标记已使用
                if (typeof window.validateCode !== 'function') {
                    alert('系统初始化失败，请刷新');
                    return;
                }
                const validation = window.validateCode(rawCode);
                if (!validation.valid) {
                    alert(validation.message);
                    codeInput.value = '';
                    codeInput.focus();
                    return;
                }

                const targetUrl = getTargetUrlByCode(rawCode);
                if (targetUrl) {
                    window.location.href = targetUrl;
                }
            }

            enterBtn.addEventListener('click', handleRedeem);
            codeInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleRedeem();
            });
        })();
    </script>
</body>
</html>

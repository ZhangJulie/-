<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TA是隐藏的黑暗人格吗？</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f5fa;
            color: #1a2b3c;
            padding: 20px;
            line-height: 1.5;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-direction: row;
            gap: 24px;
            flex-wrap: wrap;
        }
        .left-panel {
            flex: 2;
            min-width: 320px;
            background: white;
            border-radius: 36px;
            padding: 28px 30px;
            box-shadow: 0 20px 35px -8px rgba(0,30,60,0.15);
        }
        .right-panel {
            flex: 1;
            min-width: 280px;
            background: white;
            border-radius: 36px;
            padding: 28px 24px;
            box-shadow: 0 20px 35px -8px rgba(0,30,60,0.15);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(145deg, #1f3a5f, #102a40);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .desc {
            background: #e7eef8;
            padding: 16px 22px;
            border-radius: 40px;
            margin-bottom: 30px;
            font-size: 1.05rem;
            color: #1e3b5a;
            border: 1px solid #cbd7e6;
        }
        .progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-weight: 500;
            color: #2b4b6e;
        }
        .progress-bar-bg {
            height: 10px;
            background: #d9e2ef;
            border-radius: 20px;
            flex: 1;
            margin: 0 15px;
        }
        .progress-fill {
            height: 10px;
            background: #2b4f7b;
            border-radius: 20px;
            width: 0%;
            transition: width 0.2s;
        }
        .question-num {
            font-size: 1rem;
            background: #1e3b5a;
            color: white;
            padding: 5px 18px;
            border-radius: 40px;
        }
        .question-box {
            margin: 30px 0 40px;
        }
        .q-text {
            font-size: 1.7rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 40px;
            color: #0b253a;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 20px;
        }
        .option {
            display: flex;
            align-items: flex-start;
            gap: 18px;
            background: #f7faff;
            padding: 18px 24px;
            border-radius: 50px;
            border: 2px solid transparent;
            transition: all 0.15s;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .option:hover {
            background: #ecf3fe;
            border-color: #a1bbd9;
        }
        .option.selected {
            background: #e1ebfa;
            border-color: #2b4f7b;
            box-shadow: 0 6px 12px rgba(30,70,120,0.1);
        }
        input[type="radio"] {
            margin-top: 3px;
            accent-color: #1f3a5f;
            transform: scale(1.3);
            flex-shrink: 0;
        }
        .nav-buttons {
            display: flex;
            gap: 16px;
            justify-content: space-between;
            margin-top: 40px;
        }
        .nav-btn {
            background: white;
            border: 2px solid #c1d3e8;
            padding: 16px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1d3957;
            cursor: pointer;
            transition: all 0.15s;
            flex: 1;
            text-align: center;
        }
        .nav-btn.primary {
            background: #1e3b5a;
            border-color: #1e3b5a;
            color: white;
        }
        .nav-btn.primary:hover {
            background: #143048;
        }
        .nav-btn:hover {
            background: #e2ecf9;
        }
        .nav-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .btn {
            background: #1e3b5a;
            color: white;
            border: none;
            padding: 16px 20px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 10px 20px rgba(0,35,70,0.2);
            margin: 20px 0 16px;
        }
        .btn:hover {
            background: #143048;
        }
        .score-board {
            background: #edf4fc;
            border-radius: 32px;
            padding: 20px 18px;
            margin: 20px 0;
        }
        .dimension-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #b1c7e0;
        }
        .dimension-name {
            font-weight: 600;
        }
        .dimension-score {
            font-weight: 700;
            color: #113458;
        }
        .highlight {
            background: #fedfa3;
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: 700;
        }
        .verdict {
            background: #e1eefb;
            border-radius: 32px;
            padding: 20px;
            margin-top: 20px;
            border-left: 6px solid #1e3b5a;
        }
        .radio-group {
            display: flex;
            gap: 25px;
            background: #edf2f8;
            padding: 14px 22px;
            border-radius: 60px;
            margin-top: 12px;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        .footnote {
            font-size: 0.85rem;
            color: #4f6883;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #d4e2f2;
        }
        .warning-tip {
            background: #fef2db;
            border-radius: 28px;
            padding: 12px 18px;
            font-size: 0.95rem;
            margin: 15px 0;
        }
        @media (max-width: 800px) {
            .right-panel {
                position: relative;
                top: 0;
            }
            .q-text { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 左侧：分页题目 -->
    <div class="left-panel">
        <h1>TA是隐藏的黑暗人格吗？</h1>
        <div class="desc">
            ⚡ 根据你对被观察者的日常了解，为每个场景选择最符合的描述。共20题，预计5分钟完成，确认后请点击右侧“分析结果”。
        </div>

        <!-- 进度条区域 -->
        <div class="progress">
            <span class="question-num" id="currentQDisplay">第 1 / 20 题</span>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill" style="width: 5%;"></div>
            </div>
        </div>

        <!-- 当前题目渲染区 -->
        <div id="questionContainer" class="question-box">
            <!-- 动态注入题目 -->
        </div>

        <!-- 导航按钮 -->
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" disabled>← 上一题</button>
            <button class="nav-btn primary" id="nextBtn">下一题 →</button>
        </div>
        <div class="warning-tip" id="navHint"></div>
    </div>

    <!-- 右侧：结果面板 + 控制 -->
    <div class="right-panel">
        <h2 style="font-weight:600; margin-bottom:16px;">📋 测评结论</h2>
        <button class="btn" id="calculateBtn">🔍 分析结果</button>

        <div id="scoreDisplay">
            <div class="score-board" id="scoreBoard">
                <div style="text-align:center; padding:20px; color:#4e6d8c;">完成所有题目后点击分析</div>
            </div>
            <div class="verdict" id="verdictBox"></div>
        </div>

        <!-- 第三步：是否造成伤害（主观判断） -->
        <div style="margin-top: 30px; background: #f0ede5; border-radius: 30px; padding: 18px;">
            <p style="font-weight:600; margin-bottom:12px;">⚖️ 第三步 · 最终确认</p>
            <p style="font-size:0.95rem; margin-bottom:12px;">他/她的这些行为，有没有对你或别人造成实际的痛苦、被利用、被伤害？</p>
            <div class="radio-group">
                <label>
                    <input type="radio" name="harm" value="yes" id="harmYes"> 是，有伤害
                </label>
                <label>
                    <input type="radio" name="harm" value="no" id="harmNo" checked> 否，无实质伤害
                </label>
            </div>
            <p class="footnote" style="margin-top:15px;">*结合主观感受，结论更准确</p>
        </div>
        <p class="footnote">本测试基于黑暗四角星模型，用于人际觉察，非专业诊断。</p>
    </div>
</div>

<script>
    (function() {
        // ----- 题目数据 (保留维度用于计分，但不在UI显示) -----
        const questions = [
            { id: 1, text: "在餐厅、商店等场合，他对服务员/店员的态度通常是？", dim: "m",
              options: ["礼貌客气，常说谢谢", "基本正常，偶尔不耐烦", "颐指气使，稍不满意就训斥"] },
            { id: 2, text: "当你告诉他一个好消息（如升职、获奖）时，他的反应是？", dim: "n",
              options: ["真心为你高兴，追问细节", "恭喜一下，然后聊别的", "马上讲自己更厉害的事，或泼冷水、阴阳怪气"] },
            { id: 3, text: "一起玩桌游、电竞或其他有输赢的游戏时，如果他赢了，通常会？", dim: "s",
              options: ["正常庆祝，适可而止", "有点得意，但不过分", "故意嘲讽、羞辱对手，享受对方沮丧的样子"] },
            { id: 4, text: "遇到堵车、排长队等需要等待的情况，他的表现是？", dim: "n",
              options: ["耐心等待，自嘲两句", "有点烦躁，但能克制", "试图插队、骂规则，觉得自己不该被耽误"] },
            { id: 5, text: "聊天时谈到有人被骗或被算计的新闻，他的第一反应往往是？", dim: "m",
              options: ["同情受害者，谴责骗子", "觉得双方都有问题", "佩服骗子的手段，说受害者太蠢"] },
            { id: 6, text: "聚会合影后，他通常会？", dim: "n",
              options: ["看整体效果，大家好看就行", "先看自己，不好看会提意见", "只关心自己，别人被挡脸或拍丑了无所谓"] },
            { id: 7, text: "当你生病、心情低落或遇到困难时，他通常会？", dim: "p",
              options: ["主动关心，问你需要什么帮助", "简单问候一下，然后聊自己的事", "表现得不耐烦，或直接消失"] },
            { id: 8, text: "有人当众出丑（如摔跤、说错话、被批评）时，他的反应是？", dim: "s",
              options: ["帮忙解围或当没看见", "跟着笑一下，但马上停", "笑得最大声，事后反复提起取乐"] },
            { id: 9, text: "多次聚餐或集体消费时，他在买单方面的表现是？", dim: "m",
              options: ["主动AA，偶尔请客", "不主动也不拒绝，随大流", "总是忘带钱，或对AA斤斤计较"] },
            { id: 10, text: "聊起年轻时做过的错事或坏事，他的态度是？", dim: "p",
              options: ["表示后悔，觉得当时不对", "当笑话讲，但有点不好意思", "炫耀自己多厉害，毫无悔意"] },
            { id: 11, text: "他曾经许下的承诺或说过的话，兑现率如何？", dim: "p",
              options: ["说到做到，偶尔忘会解释", "大部分能做到，小事会忘", "经常开空头支票，从不落实"] },
            { id: 12, text: "当你明确表示不喜欢他开的某个玩笑后，他会？", dim: "n",
              options: ["立刻停止并道歉", "哦一声，以后少开", "说你开不起玩笑，变本加厉"] },
            { id: 13, text: "他对流浪猫狗、小孩或比自己弱小的生命的态度是？", dim: "p",
              options: ["有爱心，愿意帮忙", "不关心，但也不伤害", "故意吓唬或表现出冷漠"] },
            { id: 14, text: "聊起过去合作完成的项目或工作成果，他通常会？", dim: "m",
              options: ["肯定团队贡献，分享功劳", "说自己做得不错，也提队友", "把所有功劳归于自己，推卸失败责任"] },
            { id: 15, text: "一起看悲剧电影或感人新闻时，他的情绪反应是？", dim: "p",
              options: ["会被感动，有情绪反应", "比较平静，说“还行吧”", "完全没感觉，甚至觉得无聊好笑"] },
            { id: 16, text: "吵架或意见不合时，他通常的表现是？", dim: "s",
              options: ["就事论事，试图解决", "声音变大，但还能听进去", "故意说狠话，专戳对方痛处"] },
            { id: 17, text: "对下属、实习生或职位低于他的人，他通常？", dim: "m",
              options: ["耐心指导，平等对待", "公事公办，保持距离", "摆架子，随意使唤，不尊重"] },
            { id: 18, text: "开车或坐车时，他的驾驶风格或对交通的态度是？", dim: "n",
              options: ["遵守交规，平稳驾驶", "偶尔超速，但有分寸", "路怒症，别车骂人，觉得别人都傻"] },
            { id: 19, text: "聊天时涉及他人隐私（如八卦、秘密），他的表现是？", dim: "s",
              options: ["主动回避，不打听", "听听而已，不传播", "特别感兴趣，追问细节，甚至传播"] },
            { id: 20, text: "在网上（如社交媒体、论坛）讨论时，他通常？", dim: "s",
              options: ["和现实中一样，讲道理", "偶尔发泄情绪", "完全变个人，攻击性强，享受骂战"] }
        ];

        // 维度中文名映射
        const dimNames = { 'm': '马基雅维利主义', 'n': '自恋', 'p': '心理变态', 's': '日常施虐' };

        // 当前题索引 (0-19)
        let currentIndex = 0;
        // 存储答案 (长度为20，值为1,2,3 或 null)
        let answers = new Array(20).fill(null);

        // DOM 元素
        const questionContainer = document.getElementById('questionContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const currentQDisplay = document.getElementById('currentQDisplay');
        const progressFill = document.getElementById('progressFill');
        const navHint = document.getElementById('navHint');
        const calculateBtn = document.getElementById('calculateBtn');
        const scoreBoard = document.getElementById('scoreBoard');
        const verdictBox = document.getElementById('verdictBox');

        // 渲染当前题目
        function renderQuestion() {
            const q = questions[currentIndex];
            let html = `<div class="q-text">${currentIndex+1}. ${q.text}</div>`;
            html += `<div class="options">`;
            q.options.forEach((optText, idx) => {
                const val = idx + 1; // 1,2,3
                const checked = answers[currentIndex] === val ? 'checked' : '';
                html += `<label class="option ${checked ? 'selected' : ''}">`;
                html += `<input type="radio" name="qOption" value="${val}" ${checked} data-val="${val}">`;
                html += `<span>${optText}</span>`;
                html += `</label>`;
            });
            html += `</div>`;
            questionContainer.innerHTML = html;

            // 为当前页的radio添加事件监听 (保存答案)
            document.querySelectorAll('input[name="qOption"]').forEach(radio => {
                radio.addEventListener('change', function(e) {
                    const val = parseInt(e.target.value);
                    answers[currentIndex] = val;
                    // 高亮选中的选项
                    document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                    e.target.closest('.option').classList.add('selected');
                    // 更新进度条和提示
                    updateProgressAndButtons();
                });
            });

            updateProgressAndButtons();
        }

        // 更新进度显示、按钮状态、提示
        function updateProgressAndButtons() {
            // 更新进度文本
            currentQDisplay.innerText = `第 ${currentIndex+1} / 20 题`;
            // 更新进度条 (已答题数/20)
            const answeredCount = answers.filter(a => a !== null).length;
            const percent = (answeredCount / 20) * 100;
            progressFill.style.width = percent + '%';

            // 上一页按钮状态
            prevBtn.disabled = currentIndex === 0;

            // 下一页按钮文字 & 禁用逻辑 (最后一页)
            if (currentIndex === 19) {
                nextBtn.innerText = '最后一题';
                nextBtn.disabled = true;
                navHint.innerText = '✅ 已完成所有题目，点击右侧“分析结果”查看结论。';
            } else {
                nextBtn.innerText = '下一题 →';
                nextBtn.disabled = false;
                navHint.innerText = '';
            }
        }

        // 切换题目
        function goToPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function goToNext() {
            if (currentIndex < 19) {
                // 如果当前题未答，可以允许跳转，但最好提醒一下？允许自由跳转，不强求，但为了友好，加个提醒
                if (answers[currentIndex] === null) {
                    if (!confirm('当前题目尚未选择，确定跳过吗？')) {
                        return;
                    }
                }
                currentIndex++;
                renderQuestion();
            }
        }

        // 事件绑定
        prevBtn.addEventListener('click', goToPrev);
        nextBtn.addEventListener('click', goToNext);

        // 分析结果按钮
        calculateBtn.addEventListener('click', function() {
            // 检查所有题目是否已回答
            const missingIndices = [];
            answers.forEach((ans, idx) => {
                if (ans === null) missingIndices.push(idx+1);
            });
            if (missingIndices.length > 0) {
                alert(`还有 ${missingIndices.length} 题未完成：第 ${missingIndices.join(', ')} 题。请返回作答。`);
                // 可自动跳转到第一个未答题
                currentIndex = missingIndices[0] - 1;
                renderQuestion();
                return;
            }

            // 计算维度得分
            const dimScores = { m:0, n:0, p:0, s:0 };
            let total = 0;
            let cCount = 0;

            for (let i = 0; i < 20; i++) {
                const dim = questions[i].dim;
                const val = answers[i];
                dimScores[dim] += val;
                total += val;
                if (val === 3) cCount++;
            }

            const mScore = dimScores['m'];
            const nScore = dimScores['n'];
            const pScore = dimScores['p'];
            const sScore = dimScores['s'];

            // 显著维度（>=12）
            const significant = [];
            if (mScore >= 12) significant.push('马基雅维利主义');
            if (nScore >= 12) significant.push('自恋');
            if (pScore >= 12) significant.push('心理变态');
            if (sScore >= 12) significant.push('日常施虐');

            let typeText = '';
            if (significant.length === 0) typeText = '无明显主导类型';
            else if (significant.length === 1) typeText = significant[0] + '主导';
            else typeText = '混合型黑暗人格：' + significant.join(' + ');

            // 严重程度
            let severityLevel = '';
            if (total <= 35 && cCount <= 3) severityLevel = '正常范围';
            else if ( (total >= 36 && total <=45) || (cCount >=4 && cCount <=8) ) severityLevel = '有黑暗特质';
            else if ( total >= 46 || cCount >=9 ) severityLevel = '高度疑似黑暗人格';
            else severityLevel = '有黑暗特质';

            // 伤害判断
            const harmYes = document.getElementById('harmYes').checked;
            const harmNo = document.getElementById('harmNo').checked;

            let finalVerdict = '';
            if (harmNo) {
                if (severityLevel === '正常范围') finalVerdict = '✅ 正常范围，无明显黑暗人格特征。';
                else if (severityLevel === '有黑暗特质') finalVerdict = `⚠️ 他具有${significant.length>0?typeText:'某些黑暗特质'}，但未造成实质伤害。可以相处，但建议留心。`;
                else if (severityLevel === '高度疑似黑暗人格') finalVerdict = `🔍 高度疑似黑暗人格 (${typeText})，但目前未观察到实质伤害。建议观察边界。`;
            } else {
                if (severityLevel === '正常范围') finalVerdict = `⚠️ 虽然得分在正常范围，但你感受到伤害，这很重要。请相信直觉，重新评估关系。`;
                else if (severityLevel === '有黑暗特质') finalVerdict = `❗ 典型黑暗人格 (${typeText})，且已造成伤害。建议保持距离，认真评估关系。`;
                else if (severityLevel === '高度疑似黑暗人格') finalVerdict = `🚨 高度疑似黑暗人格 (${typeText})，且已造成实际伤害。强烈建议设立边界，考虑远离。`;
            }

            // 更新右侧面板
            document.getElementById('scoreBoard').innerHTML = `
                <div class="dimension-row"><span class="dimension-name">马基雅维利主义</span><span class="dimension-score">${mScore} / 15</span></div>
                <div class="dimension-row"><span class="dimension-name">自恋</span><span class="dimension-score">${nScore} / 15</span></div>
                <div class="dimension-row"><span class="dimension-name">心理变态</span><span class="dimension-score">${pScore} / 15</span></div>
                <div class="dimension-row"><span class="dimension-name">日常施虐</span><span class="dimension-score">${sScore} / 15</span></div>
                <div class="dimension-row" style="border-bottom:none; margin-top:8px;"><span>总分</span><span class="highlight">${total} / 60</span></div>
                <div class="dimension-row" style="border-bottom:none;"><span>C选项数 (3分项)</span><span class="highlight">${cCount}</span></div>
            `;

            verdictBox.innerHTML = `
                <h3 style="margin-bottom:8px;">📌 判定结果</h3>
                <p><strong>主导类型：</strong>${typeText}</p>
                <p><strong>严重程度：</strong>${severityLevel}</p>
                <p><strong>伤害确认：</strong>${harmYes ? '✅ 有实际伤害' : '❌ 无实质伤害'}</p>
                <p style="margin-top:14px; background:white; padding:16px; border-radius:28px;"><span style="font-weight:600;">最终结论：</span><br>${finalVerdict}</p>
            `;
        });

        // 初始化第一题
        renderQuestion();
    })();
</script>
</body>
</html>

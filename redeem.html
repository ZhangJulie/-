<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性格测试兑换</title>
    <!-- 引入外部兑换码列表 -->
    <script src="codes.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f4f7fb, #e9eef4);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1rem;
        }
        .card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            box-shadow: 0 20px 40px -12px rgba(0,20,40,0.25);
            width: 100%;
            max-width: 460px;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255,255,255,0.5);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e2b3c, #2c3e50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 0.3rem;
        }
        .sub {
            text-align: center;
            color: #5b6f82;
            margin-bottom: 2.5rem;
            border-bottom: 1px dashed #cbd5e1;
            padding-bottom: 0.75rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .code-input {
            width: 100%;
            padding: 0 20px;
            height: 58px;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            outline: none;
            transition: 0.2s;
            background: #ffffffd9;
        }
        .code-input:focus {
            border-color: #7c9bc0;
            box-shadow: 0 0 0 4px rgba(124,155,192,0.2);
        }
        .enter-btn {
            background: #2d3e58;
            border: none;
            height: 58px;
            border-radius: 24px;
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 18px -8px #1e2f3f80;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.15s;
        }
        .enter-btn:hover {
            background: #1f2e44;
            transform: scale(1.02);
        }
        .enter-btn:active {
            transform: scale(0.97);
        }
        .reserved-hint {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #8899aa;
            text-align: center;
            border-top: 1px dotted #ccdbe9;
            padding-top: 1rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚡ 性格测试兑换</h1>
        <div class="sub">输入兑换码 · 即刻进入</div>
        <div class="input-group">
            <input type="text" id="redeemCode" class="code-input" placeholder="例如：TEST001" autofocus>
            <button id="enterBtn" class="enter-btn">
                <span>进入</span>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>
        <div class="reserved-hint">
            ⚙️ 兑换码统一在 codes.js 中管理，可随时增加
        </div>
    </div>

    <script>
        (function() {
            // 从外部文件读取兑换码列表
            const CONFIG = {
                // ⚠️ 重要：请将下方地址替换为您的测试页面真实URL
                testPageUrl: 'https://zhangjulie.github.io/-/test.html',  // ← 替换成您的测试页面地址
                validCodes: window.VALID_CODES || [],  // 从 codes.js 获取
                customValidate: null
            };

            const codeInput = document.getElementById('redeemCode');
            const enterBtn = document.getElementById('enterBtn');

            function isCodeValid(code) {
                if (typeof CONFIG.customValidate === 'function') {
                    return CONFIG.customValidate(code);
                }
                if (CONFIG.validCodes.length > 0) {
                    return CONFIG.validCodes.includes(code);
                }
                return true; // 无限制模式（一般不会走到这里）
            }

            function buildTargetUrl(code) {
                let base = CONFIG.testPageUrl;
                if (!base) {
                    alert('错误：测试页面地址未配置');
                    return '#';
                }
                const encodedCode = encodeURIComponent(code);
                try {
                    if (base.startsWith('http://') || base.startsWith('https://')) {
                        const url = new URL(base);
                        url.searchParams.set('code', encodedCode);
                        return url.toString();
                    }
                } catch (e) {}
                const separator = base.includes('?') ? '&' : '?';
                return `${base}${separator}code=${encodedCode}`;
            }

            function handleRedeem() {
                const rawCode = codeInput.value.trim();
                if (rawCode === '') {
                    alert('请输入兑换码');
                    codeInput.focus();
                    return;
                }
                if (!isCodeValid(rawCode)) {
                    alert('无效兑换码，请核对后重试');
                    codeInput.value = '';
                    codeInput.focus();
                    return;
                }
                const targetUrl = buildTargetUrl(rawCode);
                if (targetUrl && targetUrl !== '#') {
                    window.location.href = targetUrl;  // 跳转到测试页面
                }
            }

            enterBtn.addEventListener('click', handleRedeem);
            codeInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleRedeem();
            });
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真实性格测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f0f5fa, #e1e9f2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
        }
        .test-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 25px 45px -18px #1e3b5b;
            width: 100%;
            max-width: 750px;
            padding: 2.2rem 2rem;
            border: 1px solid rgba(255,255,255,0.7);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 1rem;
            border-bottom: 2px solid #dde5ed;
            padding-bottom: 0.8rem;
        }
        h1 {
            font-size: 2.1rem;
            font-weight: 600;
            background: linear-gradient(145deg, #253c5c, #1f334a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .code-badge {
            background: #dce7f3;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            color: #1f3a57;
            border: 1px solid #b5c9de;
        }
        .code-badge span {
            font-family: monospace;
            font-weight: 700;
            background: #2a405b;
            color: white;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            margin-left: 0.4rem;
        }
        .intro {
            font-size: 1rem;
            color: #2e4a6b;
            margin-bottom: 2rem;
            background: #eaf1fa;
            padding: 0.8rem 1.2rem;
            border-radius: 100px;
            display: inline-block;
        }
        .questions-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin: 2.2rem 0;
        }
        .question-item {
            background: #ffffffb8;
            border-radius: 30px;
            padding: 1.5rem 1.8rem;
            border: 1px solid white;
            box-shadow: 0 6px 14px #c8d5e3;
        }
        .q-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1f344b;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
        }
        .q-num {
            background: #34597a;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            margin-right: 12px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.4rem 1rem 0.4rem 0.5rem;
            border-radius: 40px;
            background: #f3f9ff;
            border: 1px solid #c1d6ec;
        }
        .option.selected {
            background: #d7e6ff;
            border-color: #597e9f;
        }
        .option input[type="radio"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #5d7fa0;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }
        .option input[type="radio"]:checked {
            background: #1f3e5c;
            border-color: #1f3e5c;
            box-shadow: inset 0 0 0 4px white;
        }
        .action-area {
            display: flex;
            gap: 1rem;
            margin: 2rem 0 1.5rem;
        }
        .result-btn {
            background: #2d4b6e;
            border: none;
            padding: 0.9rem 2.2rem;
            border-radius: 40px;
            color: white;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 18px -8px #1c314a;
        }
        .reset-btn {
            background: transparent;
            border: 2px solid #6b85a0;
            color: #2b405b;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
        }
        .result-box {
            background: #e4eefa;
            border-radius: 30px;
            padding: 1.6rem 2rem;
            margin-top: 1.5rem;
            border-left: 8px solid #34597a;
            display: none;
        }
        .result-title {
            font-size: 1.8rem;
            font-weight: 650;
            color: #142b41;
            margin-bottom: 0.3rem;
        }
        .result-desc {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #1d3146;
        }
        .footnote {
            font-size: 0.85rem;
            color: #6c7f96;
            margin-top: 1rem;
            border-top: 1px dashed #b7cade;
            padding-top: 0.8rem;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="test-card">
        <div class="header">
            <h1>🧠 性格测试</h1>
            <div class="code-badge">
                兑换码 <span id="codeValue">—</span>
            </div>
        </div>
        <div class="intro">✨ 请根据第一感觉选择，共5题</div>

        <div class="questions-container" id="questionsContainer"></div>

        <div class="action-area">
            <button class="result-btn" id="submitBtn">🔍 查看结果</button>
            <button class="reset-btn" id="resetBtn">↻ 重新选择</button>
        </div>

        <div class="result-box" id="resultBox">
            <div class="result-title" id="resultType"></div>
            <div class="result-desc" id="resultDesc"></div>
        </div>

        <div class="footnote">⚡ 基于真实性格维度 · 结果仅供参考</div>
    </div>

    <script>
        (function() {
            // 从URL获取兑换码
            function getQueryParam(param) {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(param) || '';
            }
            const code = getQueryParam('code');
            document.getElementById('codeValue').textContent = code || '无';

            // 题目数据
            const questions = [
                { text: '当你空闲时，你更愿意？', optionA: '和朋友一起聚会、聊天或参加活动', optionB: '独自一人看书、听音乐或思考' },
                { text: '在团队合作中，你通常扮演什么角色？', optionA: '活跃气氛、组织协调，喜欢带动大家', optionB: '默默做事、提供创意，专注于任务本身' },
                { text: '做决定时，你更依赖？', optionA: '内心的感受、直觉和价值观', optionB: '逻辑分析、客观事实和数据' },
                { text: '面对新环境或陌生人，你通常？', optionA: '很快适应，主动结识新朋友', optionB: '需要时间观察，慢慢融入' },
                { text: '你更喜欢哪种类型的电影？', optionA: '喜剧、爱情、动作片（情感丰富、剧情为主）', optionB: '科幻、悬疑、纪录片（理性烧脑、知识性强）' }
            ];

            // 结果文案
            const resultMap = {
                outgoing: { title: '🎉 外向感性型', desc: '你热情开朗，善于交际，富有同情心。你喜欢与人互动，容易察觉他人的情绪，做事常凭直觉和感受。在团队中，你是气氛担当，总能带来活力。但有时可能过于感性，需要适当平衡理性思考。' },
                inward: { title: '🌿 内向理性型', desc: '你沉稳冷静，善于分析，独立自主。你喜欢深度思考，注重逻辑和事实，对新事物会谨慎观察。在团队中，你是可靠的智囊，总能提出独到见解。但有时可能显得疏离，记得多与他人分享你的想法。' },
                balanced: { title: '⚖️ 平衡型', desc: '你兼具感性与理性，适应力强。你能在社交和独处之间自如切换，既懂得倾听内心，也擅长逻辑分析。这种平衡让你在处理各种问题时游刃有余，是朋友眼中可靠又温和的存在。' }
            };

            // 渲染题目
            const container = document.getElementById('questionsContainer');
            function renderQuestions() {
                let html = '';
                questions.forEach((q, index) => {
                    html += `
                        <div class="question-item" data-qindex="${index}">
                            <div class="q-title"><span class="q-num">${index+1}</span> ${q.text}</div>
                            <div class="options">
                                <label class="option" data-q="${index}" data-opt="A">
                                    <input type="radio" name="q${index}" value="A"> 
                                    <span>A. ${q.optionA}</span>
                                </label>
                                <label class="option" data-q="${index}" data-opt="B">
                                    <input type="radio" name="q${index}" value="B"> 
                                    <span>B. ${q.optionB}</span>
                                </label>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;

                // 高亮选中的选项
                document.querySelectorAll('.option').forEach(opt => {
                    opt.addEventListener('click', function() {
                        const name = this.querySelector('input')?.name;
                        if (name) {
                            document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
                                r.closest('.option')?.classList.remove('selected');
                            });
                        }
                        this.classList.add('selected');
                    });
                });
            }
            renderQuestions();

            // 提交结果
            const submitBtn = document.getElementById('submitBtn');
            const resetBtn = document.getElementById('resetBtn');
            const resultBox = document.getElementById('resultBox');
            const resultType = document.getElementById('resultType');
            const resultDesc = document.getElementById('resultDesc');

            function calculateResult() {
                let countA = 0, countB = 0, allSelected = true;
                for (let i = 0; i < questions.length; i++) {
                    const radios = document.getElementsByName(`q${i}`);
                    let selected = null;
                    for (let r of radios) {
                        if (r.checked) { selected = r.value; break; }
                    }
                    if (selected === 'A') countA++;
                    else if (selected === 'B') countB++;
                    else allSelected = false;
                }
                if (!allSelected) { alert('请完成所有题目'); return null; }
                if (countA > countB && countA >= 3) return resultMap.outgoing;
                if (countB > countA && countB >= 3) return resultMap.inward;
                return resultMap.balanced;
            }

            submitBtn.addEventListener('click', () => {
                const res = calculateResult();
                if (res) {
                    resultType.textContent = res.title;
                    resultDesc.textContent = res.desc;
                    resultBox.style.display = 'block';
                    resultBox.scrollIntoView({ behavior: 'smooth' });
                }
            });

            resetBtn.addEventListener('click', () => {
                for (let i = 0; i < questions.length; i++) {
                    document.getElementsByName(`q${i}`).forEach(r => r.checked = false);
                }
                document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                resultBox.style.display = 'none';
            });
        })();
    </script>
</body>
</html>

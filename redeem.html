<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性格测试兑换 · 防重复版</title>
    <!-- 引入外部兑换码列表（含已使用记录管理） -->
    <script src="codes.js"></script>
    <style>
        /* 样式与之前相同，可保留 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f4f7fb, #e9eef4);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1rem;
        }
        .card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            box-shadow: 0 20px 40px -12px rgba(0,20,40,0.25);
            width: 100%;
            max-width: 460px;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255,255,255,0.5);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e2b3c, #2c3e50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 0.3rem;
        }
        .sub {
            text-align: center;
            color: #5b6f82;
            margin-bottom: 2.5rem;
            border-bottom: 1px dashed #cbd5e1;
            padding-bottom: 0.75rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .code-input {
            width: 100%;
            padding: 0 20px;
            height: 58px;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            outline: none;
            transition: 0.2s;
            background: #ffffffd9;
        }
        .code-input:focus {
            border-color: #7c9bc0;
            box-shadow: 0 0 0 4px rgba(124,155,192,0.2);
        }
        .enter-btn {
            background: #2d3e58;
            border: none;
            height: 58px;
            border-radius: 24px;
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 18px -8px #1e2f3f80;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.15s;
        }
        .enter-btn:hover {
            background: #1f2e44;
            transform: scale(1.02);
        }
        .enter-btn:active {
            transform: scale(0.97);
        }
        .reserved-hint {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #8899aa;
            text-align: center;
            border-top: 1px dotted #ccdbe9;
            padding-top: 1rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚡ 性格测试兑换</h1>
        <div class="sub">输入兑换码 · 自动识别测试类型</div>
        <div class="input-group">
            <input type="text" id="redeemCode" class="code-input" placeholder="例如：A7B9-2K4M-PQ8R" autofocus>
            <button id="enterBtn" class="enter-btn">
                <span>进入</span>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>
        <div class="reserved-hint">
            ⚙️ 每个兑换码仅能使用一次（基于浏览器记录）
        </div>
    </div>

    <script>
        (function() {
            // ========== 配置区 ==========
            // 测试页面映射：根据兑换码第一个字符（A/B/C/D）跳转到不同页面
            const TEST_PAGE_MAP = {
                'A': 'https://zhangjulie.github.io/-/test.html',   // 当前性格测试
                'B': 'https://zhangjulie.github.io/-/test-b.html', // 预留
                'C': 'https://zhangjulie.github.io/-/test-c.html', // 预留
                'D': 'https://zhangjulie.github.io/-/test-d.html'  // 预留
            };

            // ========== 兑换码管理（集成您提供的代码） ==========
            // 从 codes.js 中获取有效列表（需确保 codes.js 已定义 window.VALID_CODES）
            const VALID_CODES = window.VALID_CODES || [];

            // 已使用兑换码：从 localStorage 读取，若没有则初始化为空数组
            let USED_CODES = [];
            try {
                USED_CODES = JSON.parse(localStorage.getItem('USED_CODES') || '[]');
            } catch (e) {
                USED_CODES = [];
            }

            // 工具函数：检查并使用兑换码
            function useCode(code) {
                // 1. 格式校验（简单检查是否符合 XXXX-XXXX-XXXX，可根据实际调整）
                if (!/^[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(code)) {
                    return { success: false, message: '无效的兑换码格式' };
                }

                // 2. 是否已被使用
                if (USED_CODES.includes(code)) {
                    return { success: false, message: '该兑换码已使用过' };
                }

                // 3. 是否在有效列表中
                if (!VALID_CODES.includes(code)) {
                    return { success: false, message: '兑换码不存在' };
                }

                // 4. 标记为已使用并保存
                USED_CODES.push(code);
                localStorage.setItem('USED_CODES', JSON.stringify(USED_CODES));

                return { success: true, message: '兑换成功！' };
            }

            // ========== 跳转逻辑 ==========
            function getTargetUrlByCode(code) {
                if (!code || code.length === 0) return null;
                const firstChar = code.charAt(0).toUpperCase(); // 提取首位并大写
                const baseUrl = TEST_PAGE_MAP[firstChar];
                if (!baseUrl) {
                    alert(`未配置该类型测试（${firstChar}），请联系管理员`);
                    return null;
                }
                // 将完整兑换码作为参数附加
                try {
                    if (baseUrl.startsWith('http://') || baseUrl.startsWith('https://')) {
                        const url = new URL(baseUrl);
                        url.searchParams.set('code', encodeURIComponent(code));
                        return url.toString();
                    }
                } catch (e) {}
                // 降级拼接
                const separator = baseUrl.includes('?') ? '&' : '?';
                return `${baseUrl}${separator}code=${encodeURIComponent(code)}`;
            }

            // ========== 处理兑换 ==========
            const codeInput = document.getElementById('redeemCode');
            const enterBtn = document.getElementById('enterBtn');

            function handleRedeem() {
                const rawCode = codeInput.value.trim();
                if (rawCode === '') {
                    alert('请输入兑换码');
                    codeInput.focus();
                    return;
                }

                // 调用 useCode 进行验证和标记
                const result = useCode(rawCode);
                if (!result.success) {
                    alert(result.message);
                    codeInput.value = ''; // 清空输入框，方便重新输入
                    codeInput.focus();
                    return;
                }

                // 验证通过，根据首位字母获取目标URL
                const targetUrl = getTargetUrlByCode(rawCode);
                if (!targetUrl) return; // 已弹窗提示

                // 跳转
                window.location.href = targetUrl;
            }

            enterBtn.addEventListener('click', handleRedeem);
            codeInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleRedeem();
            });
        })();
    </script>
</body>
</html>
